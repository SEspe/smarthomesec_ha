name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # These are checks for inclusion in the HACS *default store*, which
          # this fork is not submitted to (upstream koying fails them too).
          # The useful checks -- hacs.json schema and integration manifest --
          # still run.
          #   brands  - not registered in home-assistant/brands
          #   topics  - no GitHub repo topics set
          #   license - no LICENSE (upstream has none either)
          #   issues  - Issues disabled on the fork
          ignore: brands topics license issues
